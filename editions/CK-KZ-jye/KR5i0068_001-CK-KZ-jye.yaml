front:
  text: 天仙正理直論淺說重刋道藏輯要天仙正理直論增註
  hash: sha256:e52ebfb2c619d4df1a2eab51ec71c8eb4c0e4c005809192ba64ce9194dea0a7b
  markers:
  - {type: page-break, offset: 8, content: '', id: CK-KZ_KR5i0068_01p001a}
body:
  text: 沖虛子伍守陽譔并註眞陽子伍守虛同註道原淺說篇本曹還陽老師平常言教之目門下伍子發明爲總綱伍子道原淺說發明曰仙家修道爲仙初證則長生不死伍眞陽註云人人同此生有長其生而不死者乃仙宗有修有證之聖人也與無修證有生死之凡夫不同所以欲高出於人之上者不可無修證也修之初煉身中之元精不離元炁而復還化元炁古聖謂之煉精化炁煉到炁足卽爲初修之證炁果足而無漏竅便長生不死成漏盡神通出欲界矣此由築基之果成鍾離眞人傳道集謂是初學之小成是也昔吉王太和問曰人言長生不死最難得者最大之事老師今淺明言之但曰初證者請再詳之沖虛子曰初修煉腎中眞陽之元精謂之築基陽精煉得不漏而返成炁漸修漸補得元炁足如童子之完體方是築基成者基成則永無漏之果從此始故曰初證此由百日之得果也後面有十月化神九年還虛正是大事與天地同久正得大果謂之大成者是也世人不知後證之大只止於此便以此爲大故呂祖云修命不修性如何能入聖以其神不通靈故又言夀同天地一愚夫是也太和曰今聞教始知天仙之道爲至大極證則統理乾坤眞陽曰由色界之修證而上厯無色界之修證而超出永與虛空同體證天仙矣鍾離眞人謂之中成大成是也得到天仙卽理天上之事與天地同長久邱眞人云寸地尺天皆有所轄無空隙處是也昔吉王殿下問曰天仙虛無之極如何統理乾坤沖虛子曰初修時主顚倒乾坤主天地交泰亦是統理之始道成時如太上三大天尊之主玉淸上淸太淸者玉帝爲萬天之主者玄帝之北極鎭天者東華之帝東方者世尊在西天救世度人者天官管天地官管地水官管水者三淸有九霄三十六洞天之理者有二十四治之理者如張天師管陽平治之類塵世之下有八十一洞天之理者有五嶽之主者唐李靖主中嶽者漢張子房主王屋山者許旌陽爲丹臺宮主者王喜先生爲蓬萊上島主者涓子爲中島主者陳摶爲蓬萊下島主者鍾離眞人爲南洲講法師者邵堅爲匡廬山主楊太君爲天臺山主三茅眞君主三元罪福事此皆出於太淸玉華仙書之說及世人傳誦者以此觀之邱眞人之言亦先發明之者矣王曰是古今人人羡慕而願學者世聞仙能不死又有神通誰不羡慕又見紫陽云學仙須是學天仙唯有金丹最的端誰不願學又因果經云佛啟父王曰我欲出家爲有四願願不老願恒少壯願無病願不死此見仙佛同願但道理精深人人未必能曉古聖高眞借法象爲喻而法象實非眞我性命權指身心粗迹之近於已者以示人而實悟入於未有身未有心之上斯所謂精深也後世人遂以法象而執之如銅人身上用針炙何以愈人身之病所隔者遠也遂冒認身心而揣摩如將甘蔗囫圇一吞抑何得有眞滋味此由未能曉之故也予欲爲眾淺說之以發明前聖之所未發者前所未發者亦多如煉神還虛之理如煉精止火之機如辨採藥之何爲眞精如剖周天之何爲大何爲小如超脫以五龍之捧如常定喻乳哺之養兒皆是今皆有發明精切語夫所謂道者道字卽人所以生死所以修證必然由之而不可無者不可不知者是人所以得生之理道之用於化生謂之精炁神化生而爲人之身故精炁神之化生人卽是道之化生人而所以養生致死之由旣生有其身由精炁神盛旺則生得所養而全天年由道也精炁神衰竭則形枯而致死亦由道之所致修道者是卽此得生之理保而還初使之長其生而不死之法眞陽曰按昔太上養生胎息氣經云精全氣全精洩氣洩唯精與氣須保全眞是此義也故此書亦直說修煉精炁神保守眞元補還具足如初卽所謂三眞三全必定神仙是也得生之理者一陰一陽爲一性一命二者全而爲人也眞陽曰旣性命雙全方成得一個人亦必性命雙修方成得個仙佛未有二者不全而能成人成仙佛必以順之成人者以逆成仙佛所以知爲仙佛由於爲人何以謂之陰陽性命當未有天地未有人身之先總屬虛無如易所謂無極而太極時也眞陽曰太極是一炁之極至處無極是一炁之極無處無極在太極之先太極雖有一炁無陰陽動靜所謂鴻濛未判之時也無中恍惚若有一炁正言鴻濛未判而將判者判言分也未分陰陽動靜也是名道炁亦名先天炁以恍惚將判言先天炁必如此時此景象之炁方是虛之極靜之篤者爲至淸可煉金丹之藥物不如是炁非先天此炁久靜而一漸動而分陽而浮爲天比如人之有性也陰而沉爲地比如人之有命也沖云此言陰陽性命皆在動分後說的不兼靜一說吉王問曰動分已與靜爲二矣動後又可於動言分陰陽爲二乎沖云古云一生二二生三見得是如此便說如此陽動極而靜陰靜極而動動靜原是循環不已的陰陽相交之氣而遂生人陰陽不交則天地不能生旡炁之人必不能修旡元炁之仙佛必陰陽二炁交而後生人生仙佛也則人之所得爲生者有陰陽二炁之全有立性立命之理故曰人身一小天地者也此結上陰陽性命之說以下正說修行之事禀此陰陽二炁順行隨其自然之變化則生人逆而返還修自然之理則成仙成佛是以有三次變化而人道全人道者生身成人之道也一次變化是父母初交二炁合爲一炁而成胎也二次變化者是胎完十月有炁爲命有神爲性而將産也三次變化者是産後長大成人精炁盛極十六𡻕時也謂之三變者亦有三關修煉而仙道得初關煉精化炁中關煉炁化神上關煉神還虛謂之三關修煉而所以成仙者順行人道之三變者言一變之關自無炁而合爲一炁也父母二炁初合一於胞中只是先天一炁不名神炁此時母胞胎中無呼吸旡神及長似形胎之長似有人形微有氣似呼吸而未成呼吸正神氣將判未判之時及已成呼吸而隨母呼吸則神炁已判而未圓滿之時胎之十月未滿但已判爲二卽屬後天此之二非離一而爲二是一之顯然似有二之理二尙精微而未成粗迹從此以漸長胎之時斯時也始欲立心立腎胎中漸生五臟漸分立心腎之形而欲立性立命矣有心卽具有性之元有腎卽具有命之元神已固藏之於心炁已固藏之於臍神卽性是心中所有固不離於心炁卽命是腎中本有固不離於腎及至手足舉動翻身而口亦有啼聲者十月足矣則神炁在胎中已全此二變之關言一分爲二也出胎時先天之炁仍在臍後天之氣在口鼻而口鼻呼吸亦與臍相連貫先天之神仍在心發而馳逐爲情欲由是炁神雖二總同心之動靜爲循環此言性有動靜命亦有動靜卽前所謂一分二二亦有動靜之說如人之睡時炁也靜性也靜及其覺時本炁之覺炁也動性也動卽後所謂神炁同動者儒亦言氣一則動志者似此年至十六𡻕神識全矣精炁盛矣到此則三變之關在焉或有時而炁透陽關命根元炁之動於中未有不發散馳於外者故到陽關亦是常行之處謂之熟境則情欲之神亦到陽關神有通天徹地之能亦有知内知外之能内外總攝於一神内有動神也知外有動神也知馳於知外世人多墮於世事神炁相合則順行爲生人之本此炁化精時也謂之三變者如此修煉三關者使精返爲炁卽百日關中築基之工也法華經中佛亦說百日之期炁煉爲神卽十月關中轉神入定之工也神還爲虛九年面壁之大定也卽是從三變返到二變從二變返到一變從一變轉到虛無之位是爲天仙矣由此虛之而又虛虛到無極便是天仙陞遷到極尊處此處合用修煉之工三變者已前是說人所以得生之理自然順行者自修煉三關已後俱說使之長生不死者說到此是說人眞修實悟之時至必當用修煉之工不可不知正宜淺說之者此下皆淺說性命之道淺說修煉之工夫炁與神皆有動靜自此至而已耗精者之修也止一大段詳言成仙佛之眞宗大修行之全旨直論中之總要合宗語錄之秘機提綱於此盡之矣而靜極之際正有動機動之機頓然之覺不著世事故言機炁動卽有神動時至神知也神不知便教當面錯過卽此動機便可修仙炁動而化精行世法而耗盡以死者之必致眞人卽於動而還靜之爲修以不死機者雖若動而不爲動用方可逆修而爲仙緣此機爲生人生仙佛之分路分路者分順逆之行也機動時順此機而行卽以生人逆轉動而還靜卽成仙佛故道經云動者靜之機佛祖云若要眞不動動上有不動入死入生之要關動機乃人之可生可死者蓋人之求長生者𦂳要的炁機旣以屬動將欲出陽關而爲後天之精者陳泥丸曰子時炁到尾閭關道藏經云精者妙物眞人長生根此太上胎息氣經語也黃庭經亦云留胎止精可長生正言此未成後天精質之先天炁名元精者是也先天炁卽元精夫此炁雖動不得神宰之而順亦不成精如童子輩有眞陽之炁亦不無動靜但神旡妄覺不能宰之何曾成精不得神宰之而逆亦不返炁呂祖眞人云龍虎不交安得黃芽黃芽旣無安得大藥修仙者於此逆修不令其出陽關鍾離眞人云勒陽關則還元煉藥卽因身中之炁機合以神機元炁發動之機元神妙覺之機收藏於内返歸於元炁之根而行身中之妙運採取烹煉皆此時至妙之運用以呼吸之氣而留戀神炁黃庭經云呼吸元炁以求仙方得神炁不離則有小周天之氣候夫小周天云者天之周圍三百六十五度有零只是一個天旡二天何有小大之異名以用者小其機故名曰小言取象於子丑寅十二時如周一日之天也一日天之行周十二時之名神炁配合時氣之行住亦若周十二時之候也然氣有行住必有起止氣之爲物不能偏於行不免於住不能偏於住不免於行故道一禪師亦云未有行而不住未有住而不行行住而曰不離這個是以這個行住卽不離這個行住猶有起止白玉蟾云起於虛危穴以虛危宿在坎宮子位也起於是亦止於是亦爲一周天也如是則行所當行住所當住起所當起止所當止也氣行有數忌其太多數者同於周天者周於天則動者已復靜矣再多則著於拘滯徒爲廢時失事於理無益氣行有時忌其太久時卽數之義周天十二時候非有時亦不拘著於時但取象於時以爲節制程限耳又陳朝元曰凡煉丹隨子時陽氣生而起火則火力方全餘時起火不得或太久或不及皆火力不全不使之似於單播弄後天氣者恐以滯其先天炁之生機故也生機滯則後天呼吸無所施後天炁用之不已而先天炁不生古云鼎内若無眞種子猶將水火煮空鐺是也此修仙之至𦂳至秘之工故以周天三百六十限之雖曰周天實非天也心中妙用略有似於天之周數爲妙用之程限者子行三十六積得陽爻一百八十數午行二十四合得陰爻一百二十數五位陽爻用九也故共一百八十者除卯時不同爻用五位陰爻用六也故共一百二十者除酉時不同爻用以卯酉行沐浴以養之古聖不輕傳火故云沐浴不行火今此說云行沐浴非異也不行者不行其所有事行者行其所無事學者當知其有妙用若還持疑不決請看鍾離眞人所云一年沐浴防危險者已言矣運此天周積累動炁以完先天純陽眞炁一次火候運一次周天之數巳完足一周則眞精眞炁歸復於命根而愈旺其發動生長之機此只是眞炁在根本處自純陽不失非從外得有所增補積累故凡一動則一煉而周使機之動而復動者則煉而復煉周而復周此言凡遇有一動之炁卽要煉之以完一周天若一天不周則眞炁不長旺而速於神化又不可一周完而不歇雖旡大害亦遲其動機爲旡益也積之不過百日則精不漏而返炁矣古云百日築基煉精化炁是大槩之言也或以七八十日得炁足或五六十日得炁足功勤不差者易得年少者亦易得此三關返二之理巳返到撲地聲離胎七竅未開神識未動眞炁在臍之境也此四句言人初出母胎時是如此及今逆修時用完百日小周天之工方得眞炁足似如此所以廬江李虛庵眞人曰陽關一閉個個長生言得長生之基也眞陽曰陽精元炁總爲一身發生之根皆有耗折之理獨婬欲耗折之多而致死之速由敗於陽關陽關者陽精出入之關也出之則耗而死入之則精自滿而得長其生始也我主宰閉之不令出及滿足則關自閉矣凡有精則求出路無精以通路固自閉如儒家所謂用之而成路不用則茅塞之矣之說似故吾師祖李眞人云修到一閉卽得長生人人得閉人人長生無有異者吾兄沖虛云從此得長其生爲始便永得長生與天地齊其夀量之基也李師祖及我弟兄三人皆淺直切言之凡長生必由於一閉得一閉如此便得眞長生不能閉便不得長生求長生者當於此勉之求之昔石杏林眞人求師後云得師訣來便知此身不可死知此丹必可成精旣返而成炁則無復有精矣元精是炁因靜定之久不復動而化精婬根縮如小童子所謂返老還爲童體者是如此故佛家華嚴經亦云成就如來馬陰藏相是也如有精則未及證於盡返炁也眞陽曰有精卽是有漏之軀全無一點精方是無漏之軀世有一等人雖未行婬事而不洩精只名節慾不名無漏今之出家僻處持五戒以禁婬者是也猶有可漏精者在如玉通禪師住虎邱四十年持戒禁婬竟敗精於紅蓮妓者之千拜此正無實果之案也觀其死卽隨之又不能了生死之案也吉王問曰眞無漏者如何驗知沖虛云眞無漏則陰縮如小童子絕旡舉動絕無生精之理焉有漏始得成有修有證之漏盡通也若人老而陰縮者是陽炁殘而痿矣無精者是精巳枯竭矣從生身來禀賦得陽炁微弱所致不可誤認爲修證若人到衰老時求修證必要補精到能洩精地位而後始有可長生之機切不可誤至於老來鉛汞少者也則亦無復有此一竅矣如有竅則未及證於眞無漏也此一竅是精所出之處也精盡化炁不須用出路故旡竅若有一竅在猶可漏精則炁未得足者可知矣昔長沙王星垣殿下問曰何以知精滿盡化成炁而不漏沖虛云眞實修煉之人精巳煉成炁者便有止火之候自到此是旡精之靈應也則無竅矣此無竅無漏方眞眞炁亦不得死守於臍矣若只守於臍而不超脫過關此時始有眞炁過三關得眞炁者名得金丹大藥過三關者名曰服食逆上三關名曰飛昇不過暫有少得長其生之初基而爲人仙也未能永刧長生吉王太和殿下曾問曰得長生皆曰一得永得何故今言暫得永得之不同沖虛子曰一得而能決烈向上則有上之所證而永刧長生形神俱妙頓超刧運矣若言我已得到此果更又何爲止於此不過少得初基而巳又必煩於守護方是人仙不死若更行婬欲漏卻一點陽精猶是有漏凡夫生死不能迯者可不勉而究之哉故有遷移之法古人所謂移爐換鼎之喻者是也施祖施肩吾眞人亦呂祖之師鍾離正陽眞人呂純陽眞人之度師呂祖純陽眞人三仙傳道集所謂三遷者此當用其一遷矣吉王太和殿下問三遷之說沖虛子云按鍾離答純陽論還丹云還者往而有所歸丹者丹田也丹田有三氣在中丹神在上丹精在下丹自下田遷至中田中田遷至上田上田遷出天門是爲三遷功成旣自下而上不復更有還矣吾見鍾離此語矣聞吾師之說同卽以七日口授天機採其大藥七日者是採大藥七日之功也吉王太和殿下問曰初關百日採取烹煉於今日卽以七日採又曰採大藥從古至今不見於書全未聞此語請問何以藥稱大採之日數久暫何以異沖虛云此萬古不洩之仙機也百日之初雖曰採眞陽之精精絕旡形又名眞陽之炁炁本無相古聖祗云虛旡之炁其所發生生則無形之形附於有形徧内外皆此炁之流行所曰採採則無採之採借火爲採不見有藥形迹唯知有火而已昔還陽老師引古語爲我云夾尾閭空寄信誠然是也此言前之採也精炁生動也是杳㝠還返於靜也是杳㝠火氣薰蒸百日之久故眞炁因之忽然似有可見故止後天氣之火唯單採先天炁之藥故另用七日之工採於七日之内火異於周天故曰七日口訣何故用火之異採之異因此時眞炁盡歸於命根矣雖有動猶不離於動處祗在内而不馳於外用則無火之火無候之候也此爲異也其所用以化神還虛之大事始此所證以長生超刧神通無極之大果始此故名大藥卽前所採虛旡之炁所得所證之實相也取得下田先天眞炁名曰金丹邱長春眞人云煉精爲丹而後純陽炁生煉炁成神而後眞靈神化超凡入聖棄殻昇仙而曰超脫萬世神仙不易之法也此曰金丹卽所謂大藥用以服食飛昇拔宅者皆此耳吉王太和殿下問曰我聞砂鉛爐火中所成者曰金丹世人共知皆貪學而求服食者今仙道修煉身中自有之炁神亦曰金丹曰服食由何故沖虛曰坎腎屬水精出於腎亦屬水也水由炁化精亦由炁化金能生水故生精之炁喻金炁化精時則有炁在精中故曰母藏子腹如金在水中精復於炁故曰水中金當修煉之初如從根發出苖生而爲藥乃虛無之炁耳實無形相而虛無恍然採取不見有所採取者故不曰服食採取之久火候之足精還補炁之盛謂之外丹成其炁之發生始有法成之妙相而純陽之炁根始動以其是金炁也故曰金丹卽是外丹初時陽炁發生出於身外爲精旣返精於炁不生於外而唯實生於内得此炁生轉而逆上三關度鵲橋而下重樓經喉吻中如食故曰服食然服食二字本草言藥之可食如心服之服義同世人因此曰金丹外丹遂冒指砂鉛之丹爲卽此之外丹因此曰服食遂冒稱砂鉛之丹可服食所以自求者皆誤認爲人謀者皆誑語後學宜辨之吉王曰今而後始知世煉砂鉛求服食者爲至愚貪求不巳者猶爲下愚不移者可不明辨而攺圖哉待到尾閭界地眞陽曰尾閭者二十四椎骨下盡處界地者三岔之路上通丹田下之前通外腎竅下之後通尾閭昔曹老師先上蒲團先得大藥用七日之工到五日之間忽丹田如火珠直馳上心卽回下馳向外腎邊無竅可出卽轉馳向尾閭沖關此皆眞炁自家妙用非由人力所致但到關邊必用口授天機方纔過得關去乘其眞炁自然沖關向上之機太和曰何以得自然沖關向上沖曰平日指引之功多故也加以五龍捧聖之秘按玄帝修於武當山於捨身崖下捨其凡身有五龍捧其聖體升於萬仞崖上當知此爲超凡入聖一大妙喻也蓋玄言北方之色言坎腎也借帝喻北之嬰兒言水中之靈寶也五龍者工法中之秘機五龍捧玄帝上昇卽是以秘法捧眞陽大藥上三關轉頂之喻轉尾閭夾玉枕三關吉王太和問曰前云三關是初中上此云是尾枕爲三請示曰轉者以何爲沖虛曰前云三關虛擬其出三界之次第此云三關實指所必由之路華嚴經云踐如來所行之道不遲不速審諦經行者卽此也其道在背二十四椎間之兩頭及中也關者𦂳要當行之路而又爲難行之喻故名之尾閭者閭卽關之義尾爲骨下盡處有中左右三竅髓實不通呼吸之行乃盡於尾尾之下則竅虛而氣液皆通虛實原以不相同故名下鵲橋用秘法天機以通之令炁得轉運夾者腰與脊之異名處玉枕者椎骨之上盡處也轉之者古云一孔玄關竅三關要路頭忽然輕運動神水自然流蕭紫虛眞人云河車搬運上崑山不動纎毫到玉關妙在八門牢閉鎖陰陽一炁自循環此卽轉義也已通九竅眞陽曰每一關有中左右三竅左右者古云兩條白脉又云黃赤二道爲日月並行之道也三關則有九竅故邱祖門下徐復陽眞人云鐵鼓三三全憑一箭機佛宗人亦云九重鐵鼓又云九曲黃河曹溪西江洞水者皆是直灌頂門按諸佛諸菩薩初修皆有水灌頂卽此妙喻夾鼻牽牛過鵲橋牛性主於鼻防牛之妄走故牽鼻使由於當行之道鵲橋者鼻上路不相通之處卽崔公入藥鏡所謂上鵲橋也何爲不相通葢鼻上之路實氣不常行者鼻下之路虛乃氣所常行者虛實不相通故有妙法秘機以通喻曰鵲橋亦有大危險在也詳在後語錄中矣下重樓喉之十二重樓也而入中丹田神室之中而亦通徹於下田若合中下爲一者堂姪太一問入中田宜如何用工沖虛曰昔曹老師云下重樓而服食之是得坎實點化離陰名乾坤交姤也正是中丹田事所行大周天之火候火原是在下之物卻合下田而行者雖合下而用時時充滿虛空此便見合中下成一個虛空大境界卽有升降時而眞我不動之元性猶在於合下之内故世尊坐於菩提樹下而上升須彌頂升叨利天升兜率陀天說法而亦不離於菩提本座者與此同此華嚴經之說也又大集經云佛成正覺於欲色天二界中間化七寶坊如大千世界十方佛剎爲諸菩薩顯說甚深佛法令法久住者皆同此意世有人因古言心下腎上處肝西肺左中遂擬議著在臍之上有一穴如此則無根可歸殆非也以行大周天之氣候此以後火候名大周天與百日小周天者不同故古人云自後仍吹無孔笛從今別鼓沒絃琴大周天者如一日實周一天也一符如是十百千萬符皆如是一時如是三千六百時亦皆如是以周十月之天也吉王殿下太和問曰何爲有大小周天之異名沖虛曰天固一也而所用之工有大小之異也小者有間大周則無間矣小者有時大周則無時矣小者有數大周則無數矣何爲有間有時有數旡間旡時旡數答曰古云運罷河車君再睡來朝依舊接天機言有間也古云子午工是火候卯時沐浴酉時同言有時也古云二百一十六用在陽時一百四十四行於陰候言有數也古云工夫常不間定息號靈胎言旡間也古云晝夜晨昏看火候言無時也古云不在吹噓并數息天然言無數也此煉炁化神必然之候爲大周天之妙用也初時一瞬一息爲周一天至一刻爲一瞬息周一天至一時爲一瞬息周一天至一日十日一月十月爲一瞬息周一天元炁隨呼吸氣而俱住俱無不似小周天之一時三十六二十四周於天者之可易行也非大而何懷胎煉炁化神入定者之候如此其中有三月定力而能不食世味者有四月五月而或多月始能不食者三月之久卽能不食是入定之功勤者四五月多月之久始能不食功夫少者得證果遲唯絕食之證速則得定出定亦速食爲陰有一分陰在則用一分食分陰未盡則不仙分食未絕亦不成仙絕食遲者則得定出定亦遲所以然者由定而太和元炁充於中則不見有饑何用食又必定心堅確故得定易而有七月者有八九月十月而得定者若定心㪚亂故得定難而有十月之外者及不可計數之月而始得定者卽歇氣多時火冷丹力遲之說也今以十月得大定者言之其中又有神胎將完第八九個月十個月之時外景頗多外景者乘陰爲魔也此時或有一二分陰未消得盡若有一分陰在卽有一分魔來或見奇異世俗中平日所無者而今始有一見之謂之奇異乃見之魔眼可見而見者曰外魔曰邪魔曰天魔眼不可見而心見者曰陰魔見而喜悅貪見則著魔矣見而不見則不著魔矣或聞奇異此聞魔也不見不聞爲定聞爲魔則亂定者喜其異聞而貪聞之則著魔聞而不聞則不著魔或有可喜事物世法中平日所有者或已遇過之熟境已掃去而復偶有故曰可喜可懼可信如此下三者可喜者聲色富貴玩好受用皆是皆勿貪喜或有可懼事物可懼亦非一水火刀兵刧殺打駡一切驚恐皆是皆不可妄生懼心或有可信事物平常或有願望而欲求者或欲求而未得者今若遂願若應求爲理之可信如山東張先生在圜中見天魔而誤信爲身外有身之類者餘倣此或有心生妄念上五者是外來之魔此一句言心之妄旡故而妄想所生佛宗人謂之陰魔又謂之陰蓋或有奉上帝高眞眾聖法旨而來試道行四十九章經云諸天仙人來試或試以所欲或試以所不欲或試以所難或試以所畏試之過者諸天保舉是謂得道或張妖邪魔力而來盗眞炁如狐精化美女婬侵奪炁等事皆是凡此一切不論心妄見魔若心中生一妄則急提正念而妄自旡若眼前見一魔亦急提正念不應魔而魔自退去矣果邪果試一切不著俱以正念掃去四十九章經云不與羣魔競來者自返戈丁靈陽云靜中抑按功深或見有仙佛鬼神樓臺光彩一切境界見前不得起心憎愛俞玉吾云任他千變萬化一心不動萬邪自退如鍾離眞人試呂純陽以十魔呂眞人皆無著又如壺公以朽索懸大石於費長房座上之梁有大蛇囓索將斷令石壓費不爲之懼而正念長存此眞降魔之明案也只用正念以煉炁化神自然得至呼吸絕而無魔矣眞陽曰有呼吸未盡之定卽是陰未絕盡而陽未純故魔可來到呼吸絕而陰盡純陽則神全大定不用見聞知覺於外則魔不能干犯我不用見魔亦不見於我我不用聞魔亦不聞於我故呼吸絕者自無魔矣昔邱長春老祖師掃去魔後曾云魔過一次長福力一次魔過十分長福力十分每當過一番魔心上愈明一番性愈靈一遍此七句是我本宗老祖師邱眞人之言也沖虛子引證降魔之案按邱祖每只爲福小不能心定當過二番死魔二次飛石打折三根肋骨又險死撲折三番臂膞恁般魔障皆不動心越生苦志沖虛子昔於謝家住七十八日被火災所魔以所賣家産千餘金并九轉之力備以入山住靜供護眾居食之資者盡爲所毁當此急用之需慨然盡棄而不救亦爲當過此魔而巳有友云何不救雖少得亦可答曰有邱祖案在修行岸頭原不動心與魔應棄物同於棄家千餘金何足重此修士所以不可不知者旣得呼吸無則氣不漏而同炁返純神則無復有炁與氣矣如有炁則呼吸雖暫似無漏未爲眞絕也呼吸少定而未絕則神隨之亦只少定而未大定此時正宜綿密工夫直入大定而純神若有出入間斷卽同走丹必至無炁而後已眞炁大藥服食已盡是炁已大定矣則神全而亦大定煉炁化神之事始畢矣此第二關返一之理如此正已返到如父母初交入胎之境矣但父母初交時只虛無之炁神未分於炁中也此則炁返合於神只存一虛無之神在焉此直說分剖人胎神胎之所以然神已純全胎已滿足必不可久留於胎昔藍養素於南嶽山養胎旣成而不能出劉海蟾以李玉谿十詠寄之指示脫胎出神養素撫掌大笑而出此見胎之必不可久留亦見暗中有聖賢提揭者沖曰胎者形也久留在胎局於形中而不超脫者其炁之滅盡定者猶可離定而爲動動則同於屍解之果而已神之定者亦離定而動胎脫則神離形在虛空之境矣神還虛空而極虛空則虛空安有壞耶夫自其脫精成炁爲入胎之始脫炁氣而成神爲成胎之終炁不入於胎猶可復爲精也以未超脫其精之境也神不出於虛空猶可動其定而馳逐其氣也以未超脫其炁氣之境也故李曹二眞人曰不超不脫神不來言必出神而後得神仙以向天仙也如子胎十月形全則生神胎十月神全則出理勢之必至也此則再用遷法以神之不長著於中下而離著自中下而遷於上丹田前之初關中關皆是三田反覆化炁於下亦由上而中而下及化神轉上而居中中原是虛境旡所拘著而若不遠於炁根故云合中下皆在虛境之内卽世尊寶塔從地湧出在虛空中之說也上丹田者頂門邊之泥丸宮也旣成純神則謂之見性神之靜體謂之性性之大用及通而無障礙處謂之神古云性在泥丸命在臍也以加三年乳哺九年大定煉神而還虛也乳哺者養出胎之子也爲養神之喻也仙以得定成神雖得定乃初有所得未能久定乳哺以加養使神能大定而久也還虛者炁久定而絕無神不必用乳哺之時葢由煉炁之初神爲主令而定其炁知有神也故曰化神炁大定神亦大定神不用使令而若旡神故曰虛正無法無佛之謂也當此遷上之時非只拘神在軀殻之上猶似夀同天地之愚夫者在軀殻則非虛還虛者不著於軀殻古云入金石無礙者有軀殻則有礙出軀殻之神至虛故無礙愚夫者性不靈而無神通之謂也須用出神之理調神出殻而爲身外之身調神出殻是一至要之機有大危險之際初調其出而卽入不令出久亦不令見聞於遠境調之久其出可漸久而後入亦可漸見聞乎遠境而後入不調者恐驟出外馳而迷失本性凡初出者必調依師度法出神有當出之景及所出之理自上田出念於身外自身外收念於上田一出一收漸出漸熟漸哺漸足如是謂之乳哺三年而神圓可以千變萬化可以達地通天可以超海移山可以救水救旱濟世安民誅邪除害任其所爲皆一神所運神變神化所以謂之神仙抱樸子云欲少留則且止而佐時欲昇騰則凌霄而輕舉昔曹老師云修仙至於出神永無生死矣災與魔皆不相干初出神若一步而卽入若二步而卽入古亦云十步百步切宜照顧是也如此而後乳哺養神至於老成必三年而後可此時若欲在世護國安民也可救水救旱也可舉念者無不是神通靈應便十百千萬億年刧如是也可若不欲在世如此卽用面壁之理九年大定而後可與最上上乘仙佛齊肩矣從仙而還虛則又三遷至於天仙之虛境矣此正無極之至極處此皆十六𡻕以後至八八六十四𡻕巳化精而巳耗精者之修也精旣耗則消折者多必用工補滿而後能生眞炁轉運河車點化至神住胎入定如上所說又有童男未化精之修焉從來未行婬事精竅未通精未洩炁未耗者如集仙傳所云周從者泗洲人也幼得道徐神翁曰我少而婚彼幼而得道其神全吾不及也又世尊爲太子在宮中娶三𡚱十年不行一婬姤晝夜只修禪觀者此皆謂之童眞又韋䭾天尊經稱爲十九世童眞此三者皆同皆世所不知而亦欲淺說之者夫人自未生之前謂之胎旣生之後謂之童胎出卽爲童順而行之易童返修卽是胎逆返修亦易仙道中最難得者是童體童體精炁完全不唯修之易其法力甚大有非修補精炁者之所能及厯年至於十六𡻕炁足極矣炁已純陽精猶未漏是爲全體之童乃其本體之自全而非用力修補湊合之所爲古人云返老還童者還成如此不漏之全體而巳修仙者多是已漏之精若以此爲修必不成仙必有死有生而輪迴者故用初關築基工夫基成始與此童身相等而法力猶有所不及且童必至十六𡻕陽炁極而精將通末刧之世人人習爲婬慾之風未至十四五六則有交姤之敗炁不旺而精不壯夭而不夀者多矣此是世間愚人俗子輩不知所以爲修行者若舉斯世設有一人舉一世或有一人者極言旡仙材之人也踰十六而未漏者必爲愚癡不知婬慾之事不足以行道者也婬慾之事喪精耗炁而害道皆仙佛之所禁戒以修行大道不知婬慾之樂者必不知婬慾之害世間亦未有不知婬事者况十六𡻕之成人而猶不知乎此時而不行婬眞爲愚癡之甚而不知又或有一人能至十六炁極足而未漏此最易化神而成仙者也陽精之炁自足者免得用築基煉精補炁之工以固有之炁煉之以化神卽成神仙而了道故曰易若有能得成仙者名曰童眞以童子之全體而成眞若緣分淺薄不遇聖師點化昔抱樸子曰按仙經云寶秘仙術雖有已在弟子中者尤擇其至精彌久而後告之以要訣况世人何能强以語之耶又不自知參究採此眞炁而煉爲神亦不足以行道者也前生無積修功行故此生不遇聖師今生無修仙修佛之志何能參究天機爲凡俗混世虫耳故不足以行道百千萬年或有一人旣足十六陽極之炁又有仙師密旨昔抱樸子曰按仙經云諸得道者在胎之中已含信道之性及生而有識心好其事必遭明師而得法因其未漏之炁不用煉精之工遂以七日天機秘法七日者煉精化炁築基成功之後採大藥之法童子從此起以後皆同於大人之法採得眞炁百日之工曰採眞炁乃微陽耳此無百日之工而炁自滿足於此採實足之眞炁卽所生之大藥採此眞炁而得卽得長生採不得此眞則不長生捧過三關九竅以行煉炁化神之工所以無煉精之工者正以炁未化精而採之卽得炁未化精而洩漏則精炁本自滿足不待煉而亦可採採而必得所以世尊自修之工不用煉精只用色界四禪定爲始由本自滿足之炁獨盛旺勝於諸佛諸仙者皆以此故炁未化精者修之有四易易於時易於工易於財易於侶也易於時者不用百日之工百日工者煉精以化炁之工也炁旣化精而順行洩漏者必用煉精還而爲炁旣未化精則旡用還炁之百日從七日而十月三年七日者採大藥眞炁之期也十月者行大周天火之期也三年者出神後而乳哺陽神之期也此止言成神仙之期未說天仙也可計之程也易於工者不用小周天採補薰蒸此卽說不用百日之工從採大藥服食卽七日之工而胎神卽十月之工乳哺卽三年之工可必之果也程可計果可必者言此逐節工夫自粗而精自漸而頓可必其必至者如所謂果生枝上終期熟之說也易於財者自七日而十月三年可數之費也養胎者一人護法者二人或三計每人一日費銀二分三人則六四人則八最易數易於侶者護法之伴侶也卽二人三人輩因童眞之神淸而明淸明者情慾之竇未開聲色樂佚之念未啟炁完而足筋骨堅强不衰敗旡昏惰之氣用其護力而扶持顚危昏眊者少也純陽眞人云免顚危要人呌斯謂之四易其炁已敗於化精者此又詳言十六𡻕以後壯年老年敗精者之修則必用煉精之工故有四難難亦時工財侶也難於時者精已虛耗無大藥之生必採煉精以補精返炁而補炁則眞炁大藥始有所生多百日之關如有年之愈老則不能以百日而返足炁亦不能以百日而止工也或二百日或三百日未可知難於工者工曰百日有期内期外之不同期内者五六十日而得炁足者如曹老師五十日而得是也有七八十日而得炁足者如我以兩月半而足炁然其初尙有一月調習期外者過百日之外炁始足是以年之漸老則用工漸多如神巳昏毦必先養其淸明精炁已耗竭必先養其充實豈朝夕之力而能然哉昔鍾離眞人道要云晚年奉道根源不固自覺虛損而氣不足十年之損止用一年功補之名曰採補還丹補之數足日漸以增名曰水火旣濟曰人仙是也古人教人得之者早修莫待老來鉛汞少者鉛少者元陽眞精眞炁之耗竭遂致有精乾者有陰痿者有氣喘者有腰痛拆者有筋拘而膝不屈坐者或坐不能久聳直者皆是汞少者元神本性之昏沉或採取不能張主而精專或烹煉不能進退而終始皆迷惑錯誤者多而成眞火全候者少如此何以能百日而止工皆爲此也鉛汞旣少之時而奮志精修猶可望成還丹而證道有准經云八十尙還丹又曰百二十𡻕猶可還若不決烈精進則墮有死之類而巳故戒之曰莫待老昔馬自然曰此身不向今生度更向何生度此身難於財者以行道之期久或百日或二百三百日日費之積多百日祗用百日之費或至二百日則多矣不可以數限也不可限以百日之費而爲二百三百日之給難於侶者用工日多則給使令之久扶顚危之專遂致護道未終或以日久功遲而疑生厭心有疑其功不知成否有疑不知何日成功或以身魔家難身魔者護法之身有病魔或有災異家難者護法人之父母妻子有大變故等事而變輕道念因有魔難遂變易護道之念此往往有之者矣抱樸子昔云爲道者病於方成而志不遂又觀古人所謂同志三人護相守又曰擇侶擇財求福地老君言諸小小山者皆不可於其中作金液神丹皆無正神爲主多是木石之精千𡻕老物血食之鬼此皆邪氣不令人作福但能作禍福地者抱樸子曰按仙經云可修行居者有華山泰山霍山恒山嵩山少室山長山太白山終南山女几山地胏山王屋山抱犢山安邱山潛山青城山峩眉山綏山雲臺山羅浮山陽駕山黃金山鼈祖山大小天台山四望山蓋竹山栝蒼山皆正神在其中若有道者登居之則山神助福而福地者不過不逢兵戈之亂不爲豪强之侵不近往來之衝昔抱樸子曰按仙經云得道者與世人異路而行異處而止言不與交身不與雜太上胎息氣經云凡修行切勿令人知人知名至則禍來不安不至盗賊之擾房舍華麗衣服鮮美飮食豐盛財物盈餘庫藏充滿家具器用竒巧皆招盗賊之由略近城市易於飮食之需城市太遠買辦奔走煩難恐護法要人多方有侍者必遠樹林絕其鳥風之聒昔許由以瓢掛於樹風擊之鳴由則棄瓢亦其一驗案也屋不踰丈丈室不能容眾僅足三五人居爲修行所若大恐盗賊可據爲穴故曰僅取蔽隔風雨爲止墻必重垣内外完固遮護惡虫惡獸之患爲得其宜也明暗適宜可令人護關者得以舒暢不生疾病牀座厚褥褥厚者和軟而坐不生厭加以潔精芽茶淡飯禁戒甘旨葷腥專持素食宜遵四十九章經元始天尊法旨所云齋戒者道之根本法之津梁子欲學道淸齋奉戒眾生捨淸淨耽葷羶而以觸法譬之餓鬼㗖食死屍五味隨時五味者鹹酸甘淡油鹽醬醋之屬隨時者安其所遇隨有隨無不煩於搜索調養口腹飮食不宜過中有過則有傷害安靜氣體安居丈室而行住坐卧不爲世務塵勞凡眞實修行者靜定其心先靜定其身亦易易事耳然亦古人之長慮也古人每有入室之事遺囑我今亦詳說入室事宜修士當預爲計畫免有違缺又有極口稱爲財不難兮侶郤難者是何也求財助道者或以自巳家貲變易而得或以外護出財助道而得何難蓋爲學道本皆智士而每人品不同或以德勝而行道之心不專或以志欲爲仙而德不足或以始雖勤而終則怠玉皇經懴文云求道未勤豈能成道或喜於談笑而問道若勤其力行實悟全無有天尊言知吾道者復不能行行吾道者復不能久難至於道或初一遇待師家以杯茶便問如何成黃芽黃芽若教如此易問易得遍大地田土中盡長黃芽勝於稻芽麥芽飮師家以杯酒便問如何到了手若教了手以杯酒可換而得知了各酒店中人人皆是了手神仙故抱樸子云世間淺近之說猶不可坐待而知况神仙大事乎輕視如俚言之笑譚卽持譚笑之聞認爲得理鍾離眞人度純陽時純陽正爲九江府德化縣令棄官而隨鍾離尙有一詞云上告師尊弟子相隨七八年肩頭壓得皮開綻足下生瘡五七畨並未䝉師一句言此詞在物外淸音書中久矣旣能棄官便見有蓋世志行猶執弟子之禮多年而後得聞道成道未有初遇便傳便聞之理如父教子之栽稻鋤麥者乎劉海蟾爲燕國宰相時鍾呂二眞人造府而度劉棄相而隨六十四𡻕也至六十九𡻕而聞道而後得成抑豈有輕易得傳者乎世有光棍一見便傳者别有一故爲方士者詐設之假言及治一病之小工耳欲謀一日之飮食者欲綿取年月間之供給者欲誑取長久之衣食者非若此易言以速𢪩其所好遂其愚見何以得心腹相𢪩哉而謂天仙神仙大道亦可如是聞問爲哉或以好勝務奇而欲聞獨異於已稱獨勝於人徒務知道而不行道此一等人欲自誇得秘聞秘法勝於人者或有徒務博聞而唯自誇爲能士如遇一賓友曰能這件則亦曰這我也能遇一賓友曰能那件則亦曰那個我也能不論邪正是非一槩俱聞實無學道行道之志此一等人浮慕稱博絕非專學任旁門邪說不黜之爲非雖正理眞言亦不求徹悟所以不能學道者高明眞師當愼言於此人又或有狡詐醫士學談道而涉獵郤病旁小坐功遇富貴者用藥無功又恐他人奪其主顧故傳以坐功而郤病爲鈎連擒拏之法耳何有於學道之心此一等人我遇之甚多所見皆是如此或本志不眞學道但借學道爲芳名而陰行不道之事不道者悖道之事也凡有口稱學仙道求長生不死遂遍語人曰我能仙道長生不死愚人遂信之及談之乃說用女人作比家不知其心實爲喫騙人家女子行姦婬之計耳又有口稱能煉丹服食不死能點金銀如山嶽之多哄騙愚人出本燒煉遂拐其本銀而逃皆不道也或以口稱學道知道行道而心實不學不知不行者此不見張紫陽眞人所謂今生若不學修眞未必來生甚胎裏馬自然眞人云此身不向今生度更向何生度此身此等人當以二眞人之言自醒或以父母妻子恩愛太重而道念亦重欲割然修仙則恩愛不能盡捨玉皇經懴文云求度雖專尙多宿累皇經集註云根念未固不能進修太上靈寶大乘妙法蓮華眞經云今迷諸世網雖有眞心固不爲篤抱道不行而自望其頭不白者亦稀聞也欲繫戀恩愛又恐無常速到失卻千萬億刧難逢之道此謂兩持之心而亦兩失之心也心兩持則惑而旡決必旡成功而至於兩俱失必然之理無常速到道果得乎恩愛在乎所以行道護道三人須要決地立志修德修道修德者卽戒律中不殺不盗不婬不酒不妄語不綺語等皆是凡匡君護國救世安人救水救火救災救旱及以慈悲心救人患難疾苦貧窮饑寒等皆是於此前列假心學道數事辨得分明全無所犯不妨道行而後可稱同志自學道本皆智士句以來至後一晤一言知擇耶止一大段皆言有道之士訪外護同志之難及正道明師訪同志弟子之難者同志者能苦心修德誠心向道者方爲眞同志但侶之難於同志者於前十一欵之外更有甚不可知之處又有難於擇者也以同志者未必出於一家一鄕而爲兩相素知若師先巳得道出神者則眼見耳聞上可過色欲二十四天之上同佛見聞色欲二界者普天之下以及諸地獄中皆可見聞凡有學道而願爲門下者皆不越所見聞之中若師家只得於遇仙傳道猶爲訪友訪弟子護道之謀者則難擇人也出於一家者如曹還陽度親兄曹復陽如沖虛子傳堂弟太初堂姪太一是也出於一鄕者如還陽眞人度三里許之沖虛眞陽二人如眞陽度一里許之徒太和是也其根基性德素有相聞如一身之德行不臧者暫遇之不識也不臧者卽儒家所言不善也人之善惡必久相處而後知言可用詐多聞其言善惡自露德可虛稱久稽所行之跡則善惡難掩如一心之邪慝深邃者面交之難於察也此輩人心中全是邪惡之念所行全是邪惡之事意圖神通又點化服食欲得勢力强大勝人假作尊師敬友慇懃問道此面交假局明師亦當明此如祖父輩之基惡種禍者遠見之不及也祖與父有大惡爲基則孫與子未必肯爲善且前人之惡報身不盡必報及孫與子唯居近者而後知世積若生各異方長各異地斯亦不能遠見也此皆上蒼之必不付道者也天將惡報而師家傳以大道是謂妄傳非人如何而能以一晤一言知擇耶此前十四等人皆選擇賢弟子外護之難知者一晤者兩人對面一會也一言者一相會之談也總言相交之淺假令卽有全德堅志之士假令是今無之中而或有不可必有之言也全德者在世法中能全五倫之德於道法中又能全五戒此是君子聖賢人品便是修仙修佛之根器堅志者非上所說十四等不同品之假志眞實有心親師問學具弟子之威儀執弟子之職事不違師言不犯道律不犯王法時時切問近思一有所聞便求實悟不肯虛度光陰不敢虛負聖教此便是眞實堅志者必於學道修仙於師家之逢邂逅難於相信邂逅者偶然之相遇也師固不能辨弟子之善惡誠僞如上十四等者學道弟子亦不能辨師家之邪正聖狂不能辨卽不能信雖有相遇者爲徒遇耳所以難於相信者又係認道不眞平素操慕道之心每被方士哄曰用女人交姤爲採補接命可得長生不死見其說有一端道理遂不識此事是假及見眞正仙道淸淨亦有一端道理郤不與婬污者同快活心中冷落持疑不信何者爲是不能認正爲眞卽不能學道雖有堅志亦不成其爲堅矣不素識其道德有無不素識者不曾平日相交接也故不見不聞師家之有道德無道德但暫時一遇相談妙理而學者乃猶疑爲口頭言回想前所聞者之無所證疑此亦未必有證不知邪說假說誑人者必無證不知仙道實悟眞修者必有所證皆由未親近師家未見實厯有證也果邪果正而不敢輕於信也可惜雖遇正道而亦不得實聞正道緣師家知其不能破疑而改邪歸正便是匪才無用之人譬如無目之人糞穢臭處也將鼻一聞沉檀腦麝香處也將鼻一聞終不能棄臭而久留於香故也此尤見侶之所以難也此前假令起至此一段皆言學者遇師之難也昔呂眞人云弟子尋師易師尋弟子難者是慨嘆學者未有知識時略起一念云仙有神通變化無所不能無所不知我當學之起初遇一人不問其知道否便拜之卽是一師也遇三人五人十人俱拜之卽是三師五師十師聞一句鄙陋非道之言也爲一言之師聞十句粗淺之說也爲十句之師何以易遇易得隨其眞僞邪正總是無選擇故也若有道之師尋弟子要弟子及祖宗厯代積德循道謂之有根基滅郤惡念絕無惡事遠邪歸正精勤實悟謂之同志此等人最難得者若祖宗及身無德而輕道者不傳有惡念惡事者不傳口空談而心不實悟者不傳執郤病坐功而欲學之以求成仙者不傳視仙道同於房術以女人爲鼎取婬媾爲可成仙者不傳始勤而終怠者不傳世情急而道情緩者不傳不能護道而無益於道者不傳此皆選擇弟子之必當如是也故曰師尋弟子難古人云可喜唐朝呂洞賓至今猶在尋人度蕭眞人亦云朝朝海上尋同志尋遍東吳不見人是也彼世人遇區區奔走者於一傾蓋間而曰得遇仙曰得遇侶果何所得哉膠住於一方者與奔走遊厯四方者相去甚遠不得常相問學傾蓋者收束傘蓋之說也張雨傘以行於途相逢立談則收傘故曰傾蓋古之子華子程本是有道之士孔夫子相遇於途傾蓋而語夫子曰目擊而道存此唯聖能知聖也今言傾蓋極言偶然一見相談不久何能得仙傳道何能得侶護道以不得而曰得果何所信心而爲所相得哉覔師侶者尤當以此爲鑒戒古仙從來無一相遇之初而卽傳於後學者亦無一遇之初而卽得護道於賢侶者凡後學覔師及有道者覔侶皆當以此說輕遇之不得人爲鑒亦以輕信於一遇爲戒但後來修士必於人道中先修純德人道中者卽五倫之事也君當忠而忠親當孝而孝兄長當順而順朋友當信而信謂之純德高眞上聖皆言傳得其人身有功者當傳於有德之人也傳失其人九祖受㝠拷又云妄傳九祖受㝠拷皆言妄傳於無德惡人也有仙道者安敢妄傳非人哉凡輕易傳人者邪說誑語耳意圖誘哄人財物故意易其言以爲相𢪩遇合之機者抑可輕信者耶又能信奉眞師昔葛稚川神仙傳云劉政求長生之術不遠千里苟有勝已雖奴客必師事之今人若能如此自有眞仙踵門愼擇賢友卽此前所謂擇侶之說精心修煉於此淺說中語卽修德之欵修道之欵一一勘得透徹則長生不死神仙天仙佛世尊可計日而皆得矣予又願同志者共勉之
